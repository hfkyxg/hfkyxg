<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256" role="img" aria-label="apathy mask icon">
  <defs>
    <radialGradient id="bg" cx="50%" cy="38%" r="80%">
      <stop offset="0%" stop-color="#0c0d10"/>
      <stop offset="60%" stop-color="#050506"/>
      <stop offset="100%" stop-color="#000000"/>
    </radialGradient>
    <linearGradient id="mask" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#c7c9d1"/>
      <stop offset="55%" stop-color="#8b8e98"/>
      <stop offset="100%" stop-color="#3a3c44"/>
    </linearGradient>
    <linearGradient id="hood" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#15161a"/>
      <stop offset="100%" stop-color="#020203"/>
    </linearGradient>
    <radialGradient id="eyeglow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2de2ff"/>
      <stop offset="100%" stop-color="#0a3a44"/>
    </radialGradient>
  </defs>

  <!-- dark background -->
  <rect width="256" height="256" rx="36" fill="url(#bg)"/>

  <!-- hood / turtleneck shoulders (dark, dominant) -->
  <path d="M24 256
           C 30 196 66 176 96 168
           L 96 150 L 160 150 L 160 168
           C 190 176 226 196 232 256 Z"
        fill="url(#hood)"/>
  <path d="M96 168 C 110 184 146 184 160 168 L 160 150 L 96 150 Z" fill="#000" opacity="0.7"/>

  <!-- mask dome (muted bone, not bright white) -->
  <path d="M128 40
           C 84 40 60 80 60 124
           C 60 162 86 188 128 188
           C 170 188 196 162 196 124
           C 196 80 172 40 128 40 Z"
        fill="url(#mask)"/>

  <!-- subtle chromatic-aberration edges (dimmed) -->
  <path d="M128 40 C 84 40 60 80 60 124" fill="none" stroke="#ff2d55" stroke-width="1.5" opacity="0.35" transform="translate(-2.5,1)"/>
  <path d="M128 40 C 172 40 196 80 196 124" fill="none" stroke="#2de2ff" stroke-width="1.5" opacity="0.35" transform="translate(2.5,1)"/>

  <!-- shading on the mask to add depth -->
  <path d="M128 40 C 172 40 196 80 196 124 C 196 162 170 188 128 188 Z" fill="#000" opacity="0.18"/>

  <!-- crosshair eye (the signature) -->
  <g transform="translate(128,116)">
    <ellipse cx="0" cy="0" rx="36" ry="23" fill="#040405"/>
    <ellipse cx="0" cy="0" rx="36" ry="23" fill="url(#eyeglow)" opacity="0.25"/>
    <circle cx="0" cy="0" r="19" fill="none" stroke="#cfd2da" stroke-width="2.5"/>
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#cfd2da" stroke-width="2.5"/>
    <line x1="0" y1="-21" x2="0" y2="21" stroke="#cfd2da" stroke-width="2.5"/>
    <!-- faint chromatic split on the crosshair -->
    <line x1="-32" y1="0" x2="32" y2="0" stroke="#ff2d55" stroke-width="1" opacity="0.4" transform="translate(-1.5,0)"/>
    <line x1="0" y1="-21" x2="0" y2="21" stroke="#2de2ff" stroke-width="1" opacity="0.4" transform="translate(1.5,0)"/>
  </g>

  <!-- stitched mouth -->
  <g stroke="#040405" stroke-width="2.5">
    <line x1="98" y1="160" x2="158" y2="160"/>
    <line x1="106" y1="153" x2="106" y2="167"/>
    <line x1="118" y1="153" x2="118" y2="167"/>
    <line x1="130" y1="153" x2="130" y2="167"/>
    <line x1="142" y1="153" x2="142" y2="167"/>
    <line x1="150" y1="153" x2="150" y2="167"/>
  </g>
</svg>
