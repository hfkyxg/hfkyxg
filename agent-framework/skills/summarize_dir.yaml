name: summarize_dir
description: Scan a directory and write a structured summary report
version: "1.0.0"
author: apathy
tags: [summary, analysis, report]
params:
  - path
steps:
  - name: list
    task: "liste o diretório {path}"
    persona: demo
    workspace: "{path}"
    auto_approve: true
  - name: report
    task: "escreva o arquivo {path}/SUMMARY.md com sumário completo do diretório {path}"
    persona: demo
    workspace: "{path}"
    auto_approve: true
