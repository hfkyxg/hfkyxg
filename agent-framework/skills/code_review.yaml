name: code_review
description: Review code files for issues, style, and improvements
version: "1.0.0"
author: apathy
tags: [review, quality, code]
params:
  - path
steps:
  - name: lint
    task: "rode: ruff check {path} --output-format=text 2>&1 || true"
    persona: demo
    workspace: "."
    auto_approve: true
  - name: report
    task: "escreva o arquivo {path}/review_report.md com relatório de revisão de código"
    persona: demo
    workspace: "."
    auto_approve: true
