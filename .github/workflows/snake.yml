name: Generate Snake Game

on:
  schedule:
    - cron: "0 */4 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Red Snake SVG
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake.svg
      
      - name: Generate Dark Theme Snake (Red)
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: dist/snake-dark.svg
      
      - name: List Generated Files
        run: |
          echo "=== Arquivos gerados ==="
          ls -la dist/
          echo ""
          echo "===Verificando cor da cobra==="
          if grep -q "ef476f" dist/snake.svg 2>/dev/null; then
            echo "✅ Cobra VERMELHA detectada no SVG"
          else
            echo "⚠️ Verificando conteúdo..."
            head -50 dist/snake.svg | grep -i "color\|fill\|stroke" || echo "Arquivo gerado"
          fi
      
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Report
        if: success()
        run: echo "✅ Snake generation completed!"
      
      - name: Report Error
        if: failure()
        run: echo "❌ Snake generation failed"