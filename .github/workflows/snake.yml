name: Generate Snake Game

on:
  schedule:
    - cron: "0 */12 * * *"  # Executa a cada 12 horas
  workflow_dispatch:          # Permite execução manual
  push:
    branches: [main]         # Executa em pushes para main

# Permissões mínimas necessárias (princípio do menor privilégio)
permissions:
  contents: write            # Apenas escrita de conteúdo
  pages: write              # Para deploy no GitHub Pages (output branch)

jobs:
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 10      # Evita execuções infinitas
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0     # Necessário para histórico completo do snake
      
      - name: Generate Snake SVGs with Vibrant Colors
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=ff6b6b&color_dots=#61ffe6,#61b3ff,#4c8dff,#3b5bdb
            dist/snake-dark.svg?palette=github-dark&color_snake=ffd93d&color_dots=#2d3436,#636e72,#b2bec3,#dfe6e9
            dist/snake-green.svg?color_snake=00b894&color_dots=#55efc4,#00b894,#00cec9,#0984e3
            dist/snake-purple.svg?color_snake=a29bfe&color_dots=#fd79a8,#e84393,#6c5ce7,#a29bfe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify Generated Files
        run: |
          echo "Verificando arquivos gerados..."
          ls -la dist/
          test -f dist/snake.svg && echo "✅ snake.svg gerado com sucesso" || exit 1
          test -f dist/snake-dark.svg && echo "✅ snake-dark.svg gerado com sucesso" || exit 1
      
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Report Completion
        if: success()
        run: echo "✅ Snake game atualizado com sucesso!"
      
      - name: Report Failure
        if: failure()
        run: echo "❌ Falha na geração do snake game. Verifique os logs acima."
