name: Generate Snake Game

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  generate-snake:
    name: Generate Snake Animation
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate Red Snake
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake.svg?color_snake=ef476f&color_dots=#ebedf0,#9be9a8,#40c463,#30a14e
            dist/snake-dark.svg?color_snake=ef476f&color_dots=#161b22,#0e4429,#006d32,#26a641
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify Generated Files
        run: |
          echo "Verificando arquivos..."
          ls -la dist/
          if [ -f "dist/snake.svg" ]; then
            echo "✅ snake.svg gerado (VERMELHO)"
          fi
          if [ -f "dist/snake-dark.svg" ]; then
            echo "✅ snake-dark.svg gerado"
          fi
      
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update snake animation [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Success
        if: success()
        run: echo "✅ Cobra VERMELHA atualizada!"
      
      - name: Failure
        if: failure()
        run: echo "❌ Erro na geração"