name: Generate Snake Game

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]

permissions:
  contents: write
  pages: write

jobs:
  generate-snake:
    name: Generate Multi-Color Snake
    runs-on: ubuntu-latest
    timeout-minutes: 15
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Generate All Snake Colors
        uses: Platane/snk@v3
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/snake-blue.svg?color_snake=00b4d8&color_dots=#caf0f8,#ade8f4,#90e0ef,#48cae4
            dist/snake-green.svg?color_snake=06d6a0&color_dots=#d8f3dc,#95d5b2,#74c69d,#40916c
            dist/snake-purple.svg?color_snake=9b5de5&color_dots=#f3e8ff,#e0c3fc,#c78dff,#a855f7
            dist/snake-red.svg?color_snake=ef476f&color_dots=#ffeada,#ffccba,#ff9b85,#e63946
            dist/snake-orange.svg?color_snake=ff6b35&color_dots=#ffeddb,#ffd6a5,#ffb38a,#ff8f6b
            dist/snake-pink.svg?color_snake=ff0aaf&color_dots=#ffcef3,#ffa8e8,#ff80dd,#ff5bd1
            dist/snake-teal.svg?color_snake=20c997&color_dots=#d2f4ea,#a3e9d2,#74dfb9,#45d5a0
            dist/snake-cyan.svg?color_snake=00ffff&color_dots=#ccffff,#99ffff,#66ffff,#33ffff
            dist/snake-lime.svg?color_snake=aacc00&color_dots=#e4ffb3,#d4ff80,#c4ff4d,#b4ff1a
            dist/snake-coral.svg?color_snake=ff6f61&color_dots=#ffddd2,#ffcdb2,#ffb4a2,#ff8f7a
            dist/snake-dark.svg?color_snake=ffd60a&color_dots=#03045e,#023e8a,#0077b6,#00b4d8
            dist/snake.svg?color_snake=00b4d8&color_dots=#caf0f8,#ade8f4,#90e0ef,#48cae4
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Verify Generated Files
        run: |
          echo "=== Verificando arquivos gerados ==="
          ls -la dist/
          echo ""
          failed=0
          for color in blue green purple red orange pink teal cyan lime coral dark; do
            if [ -f "dist/snake-${color}.svg" ]; then
              echo "✅ snake-${color}.svg - OK"
            else
              echo "❌ snake-${color}.svg - FALHOU"
              failed=1
            fi
          done
          if [ -f "dist/snake.svg" ]; then
            echo "✅ snake.svg (default) - OK"
          else
            echo "❌ snake.svg (default) - FALHOU"
            failed=1
          fi
          if [ $failed -eq 1 ]; then
            echo ""
            echo "❌ Alguns arquivos não foram gerados!"
            exit 1
          fi
          echo ""
          echo "✅ Todos os 11 arquivos gerados com sucesso!"
      
      - name: Deploy to Output Branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
          commit_message: "🐍 Update multi-color snake [skip ci]"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Report Success
        if: success()
        run: |
          echo "✅ Snake game multi-cor atualizado!"
          echo "🎨 11 variações de cores geradas com sucesso!"
      
      - name: Report Failure
        if: failure()
        run: |
          echo "❌ Falha na geração."
          echo "🔍 Verifique se Platane/snk@v3 suporta múltiplas saídas na mesma execução."
